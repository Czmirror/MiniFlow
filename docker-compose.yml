services:
  db:
    image: postgres:16-alpine
    container_name: miniflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: miniflow
      POSTGRES_PASSWORD: miniflow
      POSTGRES_DB: miniflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniflow -d miniflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
